services:
  - type: web
    name: debate-agent-api
    runtime: python
    rootDir: backend
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: GLM_API_KEY
        sync: false
      - key: GLM_BASE_URL
        value: http://www.zettacore.cyou/v1
      - key: GLM_MODEL
        value: glm-5
      - key: MEM0_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: http://localhost:3000,http://127.0.0.1:3000,https://debate-agent.vercel.app
      - key: DATABASE_PATH
        value: /tmp/debates.db
