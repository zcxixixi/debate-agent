services:
  - type: web
    name: debate-agent-api
    runtime: python
    rootDir: backend
    plan: free
    autoDeploy: true
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PRIMARY_LLM_API_KEY
        sync: false
      - key: PRIMARY_LLM_PROVIDER
        value: anthropic
      - key: PRIMARY_LLM_BASE_URL
        value: https://api.minimaxi.com/anthropic
      - key: PRIMARY_LLM_MODEL
        value: MiniMax-M2.5
      - key: BACKUP_LLM_API_KEY
        sync: false
      - key: BACKUP_LLM_PROVIDER
        value: openai
      - key: BACKUP_LLM_BASE_URL
        value: http://www.zettacore.cyou/v1
      - key: BACKUP_LLM_MODEL
        value: glm-4.5-air
      - key: MEM0_API_KEY
        sync: false
      - key: LLM_TIMEOUT_SECONDS
        value: 60
      - key: CORS_ORIGINS
        value: http://localhost:3000,http://127.0.0.1:3000,https://debate-agent.vercel.app
      - key: DATABASE_PATH
        value: /tmp/debates.db
